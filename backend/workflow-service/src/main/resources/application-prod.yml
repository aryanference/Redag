spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:aetherflow}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:mysql}
  data:
    redis:
      host: ${REDIS_HOST:redis}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:aetherflow}
    password: ${RABBITMQ_PASSWORD:aetherflow}
    virtual-host: ${RABBITMQ_VHOST:/}
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:nacos:8848}
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:sentinel-dashboard:8858}
    openfeign:
      client:
        config:
          default:
            connectTimeout: ${WORKFLOW_FEIGN_CONNECT_TIMEOUT_MILLIS:5000}
            readTimeout: ${WORKFLOW_FEIGN_READ_TIMEOUT_MILLIS:1800000}

seata:
  service:
    grouplist:
      default: ${SEATA_ADDR:seata:8091}

aetherflow:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://192.168.101.68:9000}
  workflow:
    embedding:
      ollama-base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
    ocr:
      mock: ${WORKFLOW_OCR_MOCK:true}
      default-provider: ${WORKFLOW_OCR_PROVIDER:mock}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
