server:
  port: 8105

spring:
  application:
    name: file-service
  config:
    import: optional:nacos:${spring.application.name}.yml?group=DEFAULT_GROUP&refreshEnabled=true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:192.168.101.68}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:aetherflow}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:mysql}
  data:
    redis:
      host: ${REDIS_HOST:192.168.101.68}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2s}
  servlet:
    multipart:
      max-file-size: ${FILE_MULTIPART_MAX_SIZE:2GB}
      max-request-size: ${FILE_MULTIPART_MAX_REQUEST_SIZE:2GB}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:192.168.101.68:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:192.168.101.68:8848}
        file-extension: yml
        namespace: ${NACOS_NAMESPACE:}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:192.168.101.68:8858}
      eager: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: aetherflow_tx_group
  service:
    vgroup-mapping:
      aetherflow_tx_group: default
    grouplist:
      default: ${SEATA_ADDR:192.168.101.68:8091}

aetherflow:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://192.168.101.68:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://192.168.101.68:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:aetherflow}
  file:
    internal-token: ${FILE_INTERNAL_TOKEN:aetherflow-file-internal-dev-token}
    upload:
      max-size: ${FILE_UPLOAD_MAX_SIZE:524288000}
      rate-limit-count: ${FILE_UPLOAD_RATE_LIMIT_COUNT:20}
      rate-limit-window-seconds: ${FILE_UPLOAD_RATE_LIMIT_WINDOW_SECONDS:60}
      progress-ttl-seconds: ${FILE_UPLOAD_PROGRESS_TTL_SECONDS:3600}
      upload-cache-ttl-seconds: ${FILE_UPLOAD_CACHE_TTL_SECONDS:86400}
      hash-cache-ttl-seconds: ${FILE_HASH_CACHE_TTL_SECONDS:604800}
      allowed-extensions:
        - jpg
        - jpeg
        - png
        - webp
        - gif
        - mp4
        - mov
        - avi
        - webm
        - mp3
        - wav
        - ogg
        - m4a
        - aac
        - pdf
        - txt
        - csv
        - json
        - zip
      allowed-mime-types:
        - image/jpeg
        - image/png
        - image/webp
        - image/gif
        - video/mp4
        - video/quicktime
        - video/x-msvideo
        - video/webm
        - audio/mpeg
        - audio/wav
        - audio/ogg
        - audio/mp4
        - audio/aac
        - application/pdf
        - application/json
        - application/zip
        - application/octet-stream
        - text/plain
        - text/csv
      blocked-extensions:
        - exe
        - dll
        - bat
        - cmd
        - sh
        - js
        - jar
        - msi
        - ps1
        - vbs
        - com
        - scr

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level traceId=%X{traceId:-} fileId=%X{fileId:-} userId=%X{userId:-} %logger{36} - %msg%n"
