server:
  port: 8101

spring:
  application:
    name: auth-service
  # When no profile is explicitly set (e.g. local dev runs), default to `dev` so that
  # application-dev.yml is picked up automatically. Production must override this with
  # SPRING_PROFILES_ACTIVE=prod (as docker-compose.yml does).
  profiles:
    default: ${SPRING_PROFILES_DEFAULT:dev}
  config:
    import: optional:nacos:${spring.application.name}.yml?group=DEFAULT_GROUP&refreshEnabled=true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:192.168.101.68}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:aetherflow}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:mysql}
  data:
    redis:
      host: ${REDIS_HOST:192.168.101.68}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:192.168.101.68:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:192.168.101.68:8848}
        file-extension: yml
        namespace: ${NACOS_NAMESPACE:}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:192.168.101.68:8858}
      eager: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

aetherflow:
  security:
    jwt:
      issuer: aetherflow
      # DELIBERATELY EMPTY by default. The dev profile (application-dev.yml) supplies a weak
      # dev-only fallback; the prod profile (application-prod.yml) requires JWT_SECRET to be
      # set explicitly (no default - Spring will fail to resolve the placeholder if the env var
      # is missing). JwtSecretValidator additionally rejects known-default/blank/short secrets
      # at startup in any non-dev profile.
      secret: ${JWT_SECRET:}
      expire-minutes: 120
  auth:
    token:
      refresh-expire-minutes: ${JWT_REFRESH_EXPIRE_MINUTES:10080}
      # Same dev/prod split as the access secret above; prod requires JWT_REFRESH_SECRET.
      refresh-secret: ${JWT_REFRESH_SECRET:}
    security:
      login-rate-limit-per-minute: ${AUTH_LOGIN_RATE_LIMIT_PER_MINUTE:20}
      login-rate-window-seconds: ${AUTH_LOGIN_RATE_WINDOW_SECONDS:60}
      password-max-failures: ${AUTH_PASSWORD_MAX_FAILURES:5}
      password-failure-window-minutes: ${AUTH_PASSWORD_FAILURE_WINDOW_MINUTES:15}
    # Demo seed user (aether.operator / mock-password) is disabled everywhere by default.
    # Only the dev profile (application-dev.yml) re-enables it, and DemoUserInitializer
    # additionally verifies the active Spring profile is `dev` before seeding.
    demo-user:
      enabled: ${AETHER_DEMO_USER_ENABLED:false}
    oauth:
      github:
        client-id: ${GITHUB_OAUTH_CLIENT_ID:}
        client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
        redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:}
        frontend-base-url: ${FRONTEND_BASE_URL:}
        success-path: ${GITHUB_OAUTH_SUCCESS_PATH:/auth/oauth/callback}
        failure-path: ${GITHUB_OAUTH_FAILURE_PATH:/login}
        state-secret: ${GITHUB_OAUTH_STATE_SECRET:aetherflow-github-oauth-state-secret-32bytes}
        state-ttl-minutes: ${GITHUB_OAUTH_STATE_TTL_MINUTES:10}
      google:
        client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
        client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
        redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:}
        frontend-base-url: ${FRONTEND_BASE_URL:}
        success-path: ${GOOGLE_OAUTH_SUCCESS_PATH:/auth/oauth/callback}
        failure-path: ${GOOGLE_OAUTH_FAILURE_PATH:/login}
        default-redirect-path: ${GOOGLE_OAUTH_DEFAULT_REDIRECT:/projects}
        state-ttl-minutes: ${GOOGLE_OAUTH_STATE_TTL_MINUTES:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level traceId=%X{traceId} userId=%X{userId} requestId=%X{requestId} %logger{36} - %msg%n"

