user nginx;
worker_processes auto;

error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    server_tokens off;
    client_max_body_size 100m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    upstream aetherflow_gateway {
        server gateway-service:8080;
        keepalive 64;
    }

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location = /api {
            return 308 /api/;
        }

        # Browser API calls enter through /api and are still routed by Spring Cloud Gateway.
        # The deployment prefix is stripped so /api/workflows reaches Gateway as /workflows.
        location /api/ {
            rewrite ^/api/?(.*)$ /$1 break;

            proxy_pass http://aetherflow_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location = /ws {
            return 308 /ws/;
        }

        # WebSocket ingress stays at Nginx while service routing remains inside Gateway.
        # Example: /ws/notify/ws?userId=10001 -> gateway-service:8080/notify/ws?userId=10001.
        location /ws/ {
            rewrite ^/ws/?(.*)$ /$1 break;

            proxy_pass http://aetherflow_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /ws;

            proxy_buffering off;
            proxy_connect_timeout 10s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
        }

        location = /sse {
            return 308 /sse/;
        }

        # SSE must remain unbuffered so event frames flush immediately to the browser.
        # Example: /sse/notify/sse/10001 -> gateway-service:8080/notify/sse/10001.
        location /sse/ {
            rewrite ^/sse/?(.*)$ /$1 break;

            proxy_pass http://aetherflow_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /sse;

            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            proxy_connect_timeout 10s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            add_header X-Accel-Buffering no always;
        }

        location = /index.html {
            add_header Cache-Control "no-store";
            try_files /index.html =404;
        }

        location ~* ^/assets/.*\.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }

        # Vue Router history mode fallback.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
