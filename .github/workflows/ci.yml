name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Java 17
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aetherflow
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compile
        run: mvn compile -DskipTests -q -T 1C

      - name: Test
        run: mvn test -T 1C
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/aetherflow
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379

  frontend:
    name: Frontend Vue 3
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Type check + build
        run: npm run build

  python:
    name: Python AI Service
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: python-ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-ai-service/requirements.txt

      - name: Install deps
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install ruff

      - name: Lint
        run: ruff check app/ --select E,F,W --ignore E501
